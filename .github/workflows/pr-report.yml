name: PR Quality Report

on:
  workflow_run:
    workflows: [Quality Gate]
    types: [completed]

permissions:
  pull-requests: write
  contents: read

jobs:
  pr-report:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'

    steps:
      - name: Download quality reports
        uses: actions/download-artifact@v4
        with:
          name: quality-reports
          path: reports
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const commentPath = path.join('reports', 'pr-comment.md');
            if (!fs.existsSync(commentPath)) {
              core.setFailed('PR comment file not found');
              return;
            }

            const body = fs.readFileSync(commentPath, 'utf8');
            const prs = ${{ toJSON(github.event.workflow_run.pull_requests) }};

            if (!prs || prs.length === 0) {
              console.log('No pull requests associated with workflow run');
              return;
            }

            for (const pr of prs) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number
              });

              const marker = '<!-- forge-quality-report -->';
              const existing = comments.find(c => c.body?.includes(marker));
              const fullBody = marker + '\n' + body;

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: fullBody
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: fullBody
                });
              }
            }
